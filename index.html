<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Aura Ultra X | Yeni Nesil</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --bg-base: #000000;
      --bg-surface: #0a0a0c;
      --bg-surface-hover: #16161a;
      --border: #222228;
      --primary: #7c3aed;
      --primary-hover: #6d28d9;
      --accent: #ec4899;
      --text-main: #f9fafb;
      --text-muted: #71717a;
      --danger: #ef4444;
      --success: #10b981;
      --sidebar-width: 250px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg-base); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    body { background-color: var(--bg-base); color: var(--text-main); overflow-x: hidden; display: flex; justify-content: center; min-height: 100vh; }

    /* AUTH EKRANI */
    #authOverlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-base); z-index: 9999; display: flex; justify-content: center; align-items: center; padding: 20px; }
    .auth-card { background: var(--bg-surface); border: 1px solid var(--border); width: 100%; max-width: 400px; padding: 2.5rem; border-radius: 24px; box-shadow: 0 20px 50px rgba(124, 58, 237, 0.15); text-align: center; }
    .auth-logo { font-size: 2.5rem; font-weight: 800; color: var(--text-main); margin-bottom: 2rem; display: flex; align-items: center; justify-content: center; gap: 12px; }
    .auth-logo i { color: var(--primary); }
    .auth-input { width: 100%; background: var(--bg-base); border: 1px solid var(--border); color: var(--text-main); padding: 14px 16px; border-radius: 12px; font-size: 1rem; outline: none; margin-bottom: 1rem; }
    .auth-input:focus { border-color: var(--primary); }
    .btn-auth { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: 0.3s; }
    .auth-switch { margin-top: 1.5rem; color: var(--text-muted); cursor: pointer; font-size: 0.9rem; }
    .auth-switch span { color: var(--primary); font-weight: 700; }

    /* LAYOUT */
    #app { display: none; width: 100%; max-width: 1000px; grid-template-columns: var(--sidebar-width) 1fr; min-height: 100vh; }
    .sidebar { position: sticky; top: 0; height: 100vh; border-right: 1px solid var(--border); padding: 1.5rem 1rem; display: flex; flex-direction: column; justify-content: space-between; }
    .nav-link { display: flex; align-items: center; gap: 15px; padding: 12px 16px; color: var(--text-muted); text-decoration: none; font-size: 1.1rem; font-weight: 600; border-radius: 12px; cursor: pointer; margin-bottom: 5px; }
    .nav-link:hover, .nav-link.active { background: var(--bg-surface-hover); color: var(--primary); }
    .nav-link i { width: 20px; text-align: center; font-size: 1.2rem; }
    
    .main-content { min-height: 100vh; position: relative; }
    .view-section { display: none; padding: 0; }
    .view-section.active { display: block; }
    .header { position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); font-size: 1.2rem; font-weight: 800; z-index: 10; display: flex; justify-content: space-between; align-items: center; }

    /* GENEL BİLEŞENLER */
    .btn-primary { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; }
    .input-base { background: var(--bg-surface); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 8px; outline: none; width: 100%; }
    .flex-row { display: flex; gap: 10px; align-items: center; }

    /* KEŞFET */
    .composer { padding: 1.5rem; border-bottom: 1px solid var(--border); }
    .composer textarea { width: 100%; background: transparent; border: none; color: white; resize: none; min-height: 60px; outline: none; font-size: 1.1rem; }
    .composer-tools { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
    .composer-tools label { color: var(--primary); cursor: pointer; font-size: 1.2rem; }
    
    .post { padding: 1.5rem; border-bottom: 1px solid var(--border); }
    .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .user-info { display: flex; align-items: center; gap: 10px; font-weight: 700; }
    .lider-badge { background: linear-gradient(45deg, #fbbf24, #f59e0b); color: black; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; font-weight: 800; }
    .btn-vote { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 4px 10px; border-radius: 99px; font-size: 0.8rem; cursor: pointer; font-weight: 600; }
    .post-img { width: 100%; border-radius: 12px; margin-top: 10px; max-height: 400px; object-fit: cover; }
    .post-actions { display: flex; gap: 20px; margin-top: 15px; color: var(--text-muted); }
    .post-actions span { cursor: pointer; transition: 0.2s; }
    .post-actions span:hover { color: var(--primary); }
    
    .comments-section { margin-top: 15px; padding-top: 15px; border-top: 1px dashed var(--border); display: none; }
    .comment-item { background: var(--bg-surface); padding: 10px; border-radius: 8px; margin-bottom: 8px; font-size: 0.9rem; }
    .reply-box { margin-left: 20px; border-left: 2px solid var(--border); padding-left: 10px; margin-top: 5px; }

    /* ODALAR */
    .room-forms { padding: 2rem; display: flex; flex-direction: column; gap: 2rem; }
    .room-card { background: var(--bg-surface); padding: 1.5rem; border-radius: 12px; border: 1px solid var(--border); }
    
    #roomChat { display: none; height: 100vh; flex-direction: column; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 15px; }
    .chat-msg { background: var(--bg-surface); padding: 10px 15px; border-radius: 12px; max-width: 80%; align-self: flex-start; position: relative; user-select: none; }
    .chat-msg.me { background: var(--primary); align-self: flex-end; }
    .chat-msg .sender { font-size: 0.8rem; opacity: 0.7; margin-bottom: 4px; font-weight: 700; }
    .chat-msg img { max-width: 100%; border-radius: 8px; margin-top: 5px; }
    
    .chat-input-area { padding: 15px; border-top: 1px solid var(--border); display: flex; gap: 10px; align-items: center; background: var(--bg-base); }
    
    /* IOS TARZI ACTION MENU (Şikayet, Sil vs) */
    #actionSheet { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(10,10,12,0.9); backdrop-filter: blur(20px); border-top-left-radius: 20px; border-top-right-radius: 20px; z-index: 1000; padding: 20px; transform: translateY(100%); transition: 0.3s; display: flex; flex-direction: column; gap: 10px; }
    #actionSheet.show { transform: translateY(0); }
    .action-btn { background: var(--bg-surface-hover); color: white; border: none; padding: 15px; border-radius: 12px; font-size: 1.1rem; font-weight: 600; text-align: center; }
    .action-btn.danger { color: var(--danger); }
    
    /* LİDERLİK */
    .leader-list { padding: 2rem; }
    .leader-item { display: flex; justify-content: space-between; background: var(--bg-surface); padding: 15px 20px; border-radius: 12px; margin-bottom: 10px; align-items: center; }
    .leader-item:nth-child(1) { border: 2px solid #fbbf24; }
    .leader-item:nth-child(2) { border: 2px solid #94a3b8; }
    .leader-item:nth-child(3) { border: 2px solid #b45309; }

    /* KONTROL PANELİ (ADMİN) */
    #adminPanel { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-base); z-index: 99999; display: none; padding: 2rem; overflow-y: auto; }
    .report-card { background: var(--bg-surface); border: 1px solid var(--danger); padding: 15px; border-radius: 12px; margin-bottom: 15px; }

    @media (max-width: 768px) {
      #app { grid-template-columns: 1fr; }
      .sidebar { position: fixed; bottom: 0; top: auto; height: 60px; width: 100%; flex-direction: row; padding: 0 10px; background: rgba(0,0,0,0.9); z-index: 100; border-top: 1px solid var(--border); }
      .nav-link { flex: 1; justify-content: center; margin: 0; }
      .nav-link span { display: none; }
      .main-content { padding-bottom: 70px; }
    }
  </style>
</head>
<body>

  <!-- AUTH EKRANI -->
  <div id="authOverlay">
    <div class="auth-card">
      <div class="auth-logo"><i class="fa-solid fa-bolt-lightning"></i> Aura</div>
      <input type="text" id="authUsername" class="auth-input" placeholder="Kullanıcı Adı">
      <input type="password" id="authPassword" class="auth-input" placeholder="Şifre">
      <button class="btn-auth" id="authBtn" onclick="handleAuth()">Giriş Yap</button>
      <p class="auth-switch" onclick="toggleAuthMode()" id="authSwitchText">Hesabın yok mu? <span>Kayıt Ol</span></p>
    </div>
  </div>

  <!-- ANA UYGULAMA -->
  <div id="app">
    <!-- SOL PANEL -->
    <aside class="sidebar">
      <div>
        <h2 style="padding: 10px; margin-bottom: 20px; font-weight: 800; color: var(--primary);" class="desktop-only">
          <i class="fa-solid fa-bolt-lightning"></i> Aura
        </h2>
        <a class="nav-link active" onclick="switchView('kesfet')"><i class="fa-solid fa-compass"></i> <span>Keşfet</span></a>
        <a class="nav-link" onclick="switchView('odalar')"><i class="fa-solid fa-comments"></i> <span>Odalar</span></a>
        <a class="nav-link" onclick="switchView('liderlik')"><i class="fa-solid fa-trophy"></i> <span>Liderlik</span></a>
      </div>
      <div>
        <a class="nav-link" onclick="logout()" style="color: var(--danger);"><i class="fa-solid fa-power-off"></i> <span>Çıkış</span></a>
        <!-- Gizli Admin Tetikleyici (Kilide tıkla) -->
        <i class="fa-solid fa-lock" style="color: var(--border); font-size: 10px; cursor: pointer; float: right; margin-top: 10px;" onclick="openAdminPanel()"></i>
      </div>
    </aside>

    <!-- SAĞ İÇERİK -->
    <main class="main-content">
      
      <!-- KEŞFET -->
      <section id="view-kesfet" class="view-section active">
        <div class="header">Keşfet</div>
        <div class="composer">
          <textarea id="postText" placeholder="Neler düşünüyorsun?"></textarea>
          <div class="composer-tools">
            <label for="postImage"><i class="fa-regular fa-image"></i></label>
            <input type="file" id="postImage" accept="image/*" style="display: none;">
            <button class="btn-primary" onclick="createPost()">Paylaş</button>
          </div>
        </div>
        <div id="feedContainer"></div>
      </section>

      <!-- ODALAR -->
      <section id="view-odalar" class="view-section">
        <!-- Oda Seçim Ekranı -->
        <div id="roomSelection">
          <div class="header">Odalar</div>
          <div class="room-forms">
            <div class="room-card">
              <h3>Oda Ekle +</h3><br>
              <input type="text" id="newRoomName" class="input-base" placeholder="Oda Adı" style="margin-bottom: 10px;">
              <input type="password" id="newRoomPass" class="input-base" placeholder="Oda Şifresi" style="margin-bottom: 10px;">
              <button class="btn-primary" onclick="createRoom()">Oluştur</button>
            </div>
            <div class="room-card">
              <h3>Odaya Gir ->]</h3><br>
              <input type="text" id="joinRoomName" class="input-base" placeholder="Oda Adı" style="margin-bottom: 10px;">
              <input type="password" id="joinRoomPass" class="input-base" placeholder="Oda Şifresi" style="margin-bottom: 10px;">
              <button class="btn-primary" onclick="joinRoom()">Gir</button>
            </div>
          </div>
        </div>

        <!-- Oda İçi Ekranı -->
        <div id="roomChat">
          <div class="header">
            <span id="activeRoomTitle">Oda Adı</span>
            <button class="btn-primary" style="background: var(--danger);" onclick="leaveRoom()">Odadan Çık</button>
          </div>
          <div class="chat-messages" id="chatContainer"></div>
          <div class="chat-input-area">
            <label for="chatImage"><i class="fa-solid fa-plus" style="font-size: 1.5rem; color: var(--primary); cursor: pointer;"></i></label>
            <input type="file" id="chatImage" accept="image/*" style="display: none;">
            <input type="text" id="chatInput" class="input-base" placeholder="Mesaj yaz...">
            <button class="btn-primary" onclick="sendChatMessage()">Gönder</button>
          </div>
        </div>
      </section>

      <!-- LİDERLİK -->
      <section id="view-liderlik" class="view-section">
        <div class="header">Liderlik (Top 3)</div>
        <div class="leader-list" id="leaderList"></div>
        <div style="padding: 20px; text-align: center;">
          <p style="color: var(--text-muted); font-size: 0.8rem; margin-bottom: 10px;">Ay sonunda sistem değişir.</p>
          <button class="btn-primary" onclick="simulateMonthEnd()">Ayı Bitir (Sistem Testi)</button>
        </div>
      </section>
    </main>
  </div>

  <!-- IOS TARZI İŞLEM MENÜSÜ (Oda Admini İçin) -->
  <div id="actionSheet">
    <div style="text-align: center; color: var(--text-muted); margin-bottom: 10px; font-weight: bold;" id="actionTargetUser">Kullanıcı</div>
    <button class="action-btn" id="btnToggleMute" onclick="actionMute()">Engelle / Kaldır</button>
    <button class="action-btn danger" onclick="actionDeleteMsg()">Mesajı Sil</button>
    <button class="action-btn danger" onclick="actionKick()">Gruptan Çıkar</button>
    <button class="action-btn danger" onclick="actionReport()">Şikayet Et</button>
    <button class="action-btn" onclick="closeActionSheet()" style="margin-top: 10px;">İptal</button>
  </div>

  <!-- KONTROL PANELİ (ADMİN) -->
  <div id="adminPanel">
    <div class="header" style="background: transparent;">
      <span style="color: var(--danger);">KONTROL PANELİ</span>
      <button class="btn-primary" onclick="document.getElementById('adminPanel').style.display='none'">Kapat</button>
    </div>
    <div style="padding: 20px;" id="reportsContainer"></div>
  </div>

  <script>
    // --- VERİTABANI (LocalStorage) ---
    let db = {
      users: JSON.parse(localStorage.getItem('x_users')) || {}, // {username: {password, votes, isLider}}
      banned: JSON.parse(localStorage.getItem('x_banned')) || [], // ['username'] (IP ban simülasyonu)
      posts: JSON.parse(localStorage.getItem('x_posts')) || [], 
      rooms: JSON.parse(localStorage.getItem('x_rooms')) || {}, // {roomName: {password, admin, members:[], messages:[], muted:[]}}
      reports: JSON.parse(localStorage.getItem('x_reports')) || []
    };

    function saveDB() {
      localStorage.setItem('x_users', JSON.stringify(db.users));
      localStorage.setItem('x_banned', JSON.stringify(db.banned));
      localStorage.setItem('x_posts', JSON.stringify(db.posts));
      localStorage.setItem('x_rooms', JSON.stringify(db.rooms));
      localStorage.setItem('x_reports', JSON.stringify(db.reports));
    }

    let currentUser = localStorage.getItem('x_active_user');
    let isLoginMode = true;
    let activeRoom = null;
    let longPressTimer;
    let targetActionMsg = null; // İşlem yapılacak mesaj objesi

    // --- BAŞLATMA ---
    if (currentUser && !db.banned.includes(currentUser)) {
      showApp();
    } else {
      if(db.banned.includes(currentUser)) logout();
    }

    // --- AUTH SİSTEMİ ---
    function toggleAuthMode() {
      isLoginMode = !isLoginMode;
      document.getElementById('authBtn').innerText = isLoginMode ? 'Giriş Yap' : 'Kayıt Ol';
      document.getElementById('authSwitchText').innerHTML = isLoginMode ? 'Hesabın yok mu? <span>Kayıt Ol</span>' : 'Hesabın var mı? <span>Giriş Yap</span>';
    }

    function handleAuth() {
      const u = document.getElementById('authUsername').value.trim();
      const p = document.getElementById('authPassword').value.trim();
      if (!u || !p) return alert('Boş alan bırakmayın.');
      
      if (db.banned.includes(u)) return alert('Bu cihazdan giriş yapmanız kalıcı olarak engellenmiştir! (IP Ban)');

      if (isLoginMode) {
        if (db.users[u] && db.users[u].password === p) {
          currentUser = u;
          localStorage.setItem('x_active_user', u);
          showApp();
        } else alert('Hatalı bilgi.');
      } else {
        if (db.users[u]) return alert('Kullanıcı adı alınmış.');
        db.users[u] = { password: p, votes: 0, isLider: false };
        saveDB();
        currentUser = u;
        localStorage.setItem('x_active_user', u);
        showApp();
      }
    }

    function logout() {
      localStorage.removeItem('x_active_user');
      location.reload();
    }

    function showApp() {
      document.getElementById('authOverlay').style.display = 'none';
      document.getElementById('app').style.display = 'grid';
      loadFeed();
      renderLeaderboard();
    }

    // --- NAVİGASYON ---
    function switchView(viewId) {
      document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
      document.getElementById('view-' + viewId).classList.add('active');
      event.currentTarget.classList.add('active');
      
      if(viewId === 'kesfet') loadFeed();
      if(viewId === 'liderlik') renderLeaderboard();
    }

    // --- DOSYA OKUMA (Base64) ---
    function getBase64(file, callback) {
      const reader = new FileReader();
      reader.addEventListener('load', () => callback(reader.result));
      reader.readAsDataURL(file);
    }

    // --- KEŞFET (Gönderi, Fotoğraf, Oy, Yorum) ---
    function createPost() {
      const text = document.getElementById('postText').value;
      const fileInput = document.getElementById('postImage');
      
      if (!text && !fileInput.files[0]) return;

      const newPost = { id: Date.now(), author: currentUser, text: text, image: null, likes: 0, comments: [] };
      
      if (fileInput.files[0]) {
        getBase64(fileInput.files[0], (base64) => {
          newPost.image = base64;
          db.posts.unshift(newPost); saveDB(); loadFeed();
        });
      } else {
        db.posts.unshift(newPost); saveDB(); loadFeed();
      }
      document.getElementById('postText').value = '';
      fileInput.value = '';
    }

    function voteUser(username) {
      if(username === currentUser) return alert("Kendinize oy veremezsiniz!");
      db.users[username].votes = (db.users[username].votes || 0) + 1;
      saveDB();
      alert(username + " kullanıcısına oy verdiniz!");
      renderLeaderboard();
    }

    function loadFeed() {
      const feed = document.getElementById('feedContainer');
      feed.innerHTML = '';
      db.posts.forEach((post, pIndex) => {
        const isLider = db.users[post.author].isLider ? `<span class="lider-badge">Lider 1</span>` : '';
        const imgHtml = post.image ? `<img src="${post.image}" class="post-img">` : '';
        
        let commentsHtml = '';
        post.comments.forEach((c, cIndex) => {
          let repliesHtml = '';
          if(c.replies) c.replies.forEach(r => {
            repliesHtml += `<div class="reply-box"><b>${r.author}:</b> ${r.text}</div>`;
          });
          commentsHtml += `
            <div class="comment-item">
              <b>${c.author}:</b> ${c.text} ${repliesHtml}
              <div style="margin-top:5px;">
                <input type="text" id="replyInp_${pIndex}_${cIndex}" placeholder="Yanıtla..." style="background:transparent; border:none; color:white; border-bottom:1px solid gray; outline:none; font-size:0.8rem;">
                <button onclick="addReply(${pIndex}, ${cIndex})" style="background:none; color:var(--primary); border:none; cursor:pointer; font-size:0.8rem;">Gönder</button>
              </div>
            </div>`;
        });

        feed.innerHTML += `
          <div class="post">
            <div class="post-header">
              <div class="user-info">@${post.author} ${isLider}</div>
              <button class="btn-vote" onclick="voteUser('${post.author}')">Oy Ver <i class="fa-solid fa-caret-up"></i></button>
            </div>
            <p>${post.text}</p>
            ${imgHtml}
            <div class="post-actions">
              <span onclick="likePost(${pIndex})"><i class="fa-solid fa-heart"></i> ${post.likes}</span>
              <span onclick="document.getElementById('comments_${pIndex}').style.display='block'"><i class="fa-solid fa-comment"></i> Yorum</span>
            </div>
            <div class="comments-section" id="comments_${pIndex}">
              ${commentsHtml}
              <div class="flex-row" style="margin-top:10px;">
                <input type="text" id="commInp_${pIndex}" class="input-base" placeholder="Yorum yaz...">
                <button class="btn-primary" onclick="addComment(${pIndex})">Gönder</button>
              </div>
            </div>
          </div>
        `;
      });
    }

    function likePost(index) { db.posts[index].likes++; saveDB(); loadFeed(); }
    function addComment(index) {
      const val = document.getElementById(`commInp_${index}`).value;
      if(!val) return;
      db.posts[index].comments.push({ author: currentUser, text: val, replies: [] });
      saveDB(); loadFeed();
    }
    function addReply(pIndex, cIndex) {
      const val = document.getElementById(`replyInp_${pIndex}_${cIndex}`).value;
      if(!val) return;
      db.posts[pIndex].comments[cIndex].replies.push({ author: currentUser, text: val });
      saveDB(); loadFeed();
    }

    // --- ODALAR SİSTEMİ ---
    function createRoom() {
      const n = document.getElementById('newRoomName').value.trim();
      const p = document.getElementById('newRoomPass').value;
      if(!n || !p) return;
      if(db.rooms[n]) return alert('Oda zaten var.');
      
      db.rooms[n] = { password: p, admin: currentUser, members: [], messages: [], muted: [] };
      saveDB(); alert('Oda eklendi! Şimdi giriş yapabilirsiniz.');
    }

    function joinRoom() {
      const n = document.getElementById('joinRoomName').value.trim();
      const p = document.getElementById('joinRoomPass').value;
      if(!db.rooms[n] || db.rooms[n].password !== p) return alert('Hatalı oda veya şifre.');
      if(!db.rooms[n].members.includes(currentUser)) db.rooms[n].members.push(currentUser);
      
      saveDB();
      activeRoom = n;
      document.getElementById('roomSelection').style.display = 'none';
      document.getElementById('roomChat').style.display = 'flex';
      document.getElementById('activeRoomTitle').innerText = n;
      renderChat();
    }

    function leaveRoom() {
      activeRoom = null;
      document.getElementById('roomSelection').style.display = 'block';
      document.getElementById('roomChat').style.display = 'none';
    }

    function renderChat() {
      if(!activeRoom) return;
      const c = document.getElementById('chatContainer');
      c.innerHTML = '';
      const r = db.rooms[activeRoom];
      
      r.messages.forEach(m => {
        const isMe = m.author === currentUser ? 'me' : '';
        const img = m.img ? `<img src="${m.img}">` : '';
        
        // Uzun basma simülasyonu (onmousedown/mouseup ve ontouchstart/end)
        const evts = `onmousedown="startPress('${m.id}')" onmouseup="endPress()" onmouseleave="endPress()" ontouchstart="startPress('${m.id}')" ontouchend="endPress()"`;
        
        c.innerHTML += `
          <div class="chat-msg ${isMe}" ${evts} id="msg_${m.id}">
            <div class="sender">${m.author} ${m.author === r.admin ? '(Admin)' : ''}</div>
            <div>${m.text}</div>
            ${img}
          </div>
        `;
      });
      c.scrollTop = c.scrollHeight;
    }

    function sendChatMessage() {
      if(!activeRoom) return;
      const r = db.rooms[activeRoom];
      
      // Kullanıcı gruptan atılmış mı?
      if(!r.members.includes(currentUser) && r.admin !== currentUser) return alert("Bu grupta değilsiniz.");
      // Kullanıcı engelli mi (mute)?
      if(r.muted.includes(currentUser)) return alert("Admin tarafından mesaj göndermeniz engellendi.");

      const text = document.getElementById('chatInput').value;
      const fileInp = document.getElementById('chatImage');
      
      if(!text && !fileInp.files[0]) return;
      
      const msg = { id: Date.now().toString(), author: currentUser, text: text, img: null };
      
      if(fileInp.files[0]) {
        getBase64(fileInp.files[0], base64 => {
          msg.img = base64;
          r.messages.push(msg); saveDB(); renderChat();
        });
      } else {
        r.messages.push(msg); saveDB(); renderChat();
      }
      document.getElementById('chatInput').value = '';
      fileInp.value = '';
    }

    // --- ODA ADMİN YETKİLERİ (Uzun Basma Simülasyonu) ---
    function startPress(msgId) {
      if(!activeRoom || db.rooms[activeRoom].admin !== currentUser) return; // Sadece admin yapabilir
      longPressTimer = setTimeout(() => {
        openActionMenu(msgId);
      }, 600); // 600ms basılı tutma
    }
    function endPress() { clearTimeout(longPressTimer); }

    function openActionMenu(msgId) {
      const r = db.rooms[activeRoom];
      const msg = r.messages.find(x => x.id === msgId);
      if(!msg || msg.author === currentUser) return; // Kendi mesajına işlem yapma
      
      targetActionMsg = msg;
      document.getElementById('actionTargetUser').innerText = msg.author + " İşlemleri";
      
      const isMuted = r.muted.includes(msg.author);
      document.getElementById('btnToggleMute').innerText = isMuted ? "Engeli Kaldır (Mesaj Yazabilsin)" : "Engelle (Mesaj Yazamasın)";
      
      document.getElementById('actionSheet').classList.add('show');
    }

    function closeActionSheet() { document.getElementById('actionSheet').classList.remove('show'); targetActionMsg = null; }

    function actionMute() {
      const r = db.rooms[activeRoom];
      const u = targetActionMsg.author;
      if(r.muted.includes(u)) r.muted = r.muted.filter(x => x !== u);
      else r.muted.push(u);
      saveDB(); closeActionSheet(); alert("İşlem uygulandı.");
    }

    function actionDeleteMsg() {
      const r = db.rooms[activeRoom];
      r.messages = r.messages.filter(x => x.id !== targetActionMsg.id);
      saveDB(); renderChat(); closeActionSheet();
    }

    function actionKick() {
      const r = db.rooms[activeRoom];
      r.members = r.members.filter(x => x !== targetActionMsg.author);
      saveDB(); closeActionSheet(); alert("Gruptan çıkarıldı.");
    }

    function actionReport() {
      db.reports.push({
        id: Date.now(),
        reportedUser: targetActionMsg.author,
        text: targetActionMsg.text,
        roomName: activeRoom
      });
      saveDB(); closeActionSheet(); alert("Kullanıcı kontrol paneline şikayet edildi.");
    }

    // --- LİDERLİK ---
    function renderLeaderboard() {
      const list = document.getElementById('leaderList');
      list.innerHTML = '';
      
      let sorted = Object.keys(db.users).map(k => ({ username: k, votes: db.users[k].votes || 0 }))
        .sort((a, b) => b.votes - a.votes)
        .slice(0, 3); // İlk 3

      sorted.forEach((u, i) => {
        let med = i === 0 ? '🥇' : i === 1 ? '🥈' : '🥉';
        list.innerHTML += `
          <div class="leader-item">
            <div><b>${med} @${u.username}</b></div>
            <div>${u.votes} Oy</div>
          </div>
        `;
      });
    }

    function simulateMonthEnd() {
      let highest = { u: null, v: -1 };
      for(let k in db.users) {
        db.users[k].isLider = false; // Herkesin sıfırla
        if(db.users[k].votes > highest.v) { highest.v = db.users[k].votes; highest.u = k; }
      }
      if(highest.u && highest.v > 0) {
        db.users[highest.u].isLider = true;
      }
      // Oyları sıfırla
      for(let k in db.users) db.users[k].votes = 0;
      saveDB(); renderLeaderboard(); loadFeed();
      alert("Ay bitti! Yeni lider belirlendi ve oylar sıfırlandı.");
    }

    // --- KONTROL PANELİ (SİL / BAN) ---
    function openAdminPanel() {
      document.getElementById('adminPanel').style.display = 'block';
      const c = document.getElementById('reportsContainer');
      c.innerHTML = '';
      
      if(db.reports.length === 0) return c.innerHTML = '<p>Şikayet bulunmuyor.</p>';

      db.reports.forEach((r, i) => {
        c.innerHTML += `
          <div class="report-card">
            <b>Şikayet Edilen:</b> ${r.reportedUser} <br>
            <b>Oda:</b> ${r.roomName} <br>
            <b>Mesaj:</b> "${r.text}" <br><br>
            <button class="btn-primary" style="background:var(--danger);" onclick="banUser('${r.reportedUser}', ${i})">SİL (IP Ban Simülasyonu)</button>
            <button class="btn-primary" style="background:var(--text-muted);" onclick="ignoreReport(${i})">Yoksay</button>
          </div>
        `;
      });
    }

    function banUser(username, reportIndex) {
      if(!db.banned.includes(username)) db.banned.push(username);
      db.reports.splice(reportIndex, 1);
      saveDB(); openAdminPanel();
      alert(`${username} sistemden tamamen banlandı! (Cihaz/IP ban simülasyonu)`);
    }

    function ignoreReport(index) {
      db.reports.splice(index, 1);
      saveDB(); openAdminPanel();
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Aura Ultra X | Yeni Nesil Sosyal Ekosistem</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --bg-base: #000000;
      --bg-surface: #0a0a0c;
      --bg-surface-hover: #16161a;
      --border: #222228;
      --primary: #7c3aed;
      --primary-hover: #6d28d9;
      --accent: #ec4899;
      --text-main: #f9fafb;
      --text-muted: #71717a;
      --danger: #ef4444;
      --success: #10b981;
      --sidebar-width: 275px;
      --right-panel-width: 350px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
    
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg-base); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    body {
      background-color: var(--bg-base);
      color: var(--text-main);
      overflow-x: hidden;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    /* --- AUTH EKRANI --- */
    #authOverlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: var(--bg-base); z-index: 9999; display: flex;
      justify-content: center; align-items: center; padding: 20px;
    }

    .auth-card {
      background: var(--bg-surface); border: 1px solid var(--border);
      width: 100%; max-width: 440px; padding: 2.5rem; border-radius: 24px;
      box-shadow: 0 20px 50px rgba(124, 58, 237, 0.15); text-align: center;
    }

    .auth-logo { font-size: 2.5rem; font-weight: 800; color: var(--text-main); margin-bottom: 8px; display: flex; align-items: center; justify-content: center; gap: 12px; }
    .auth-logo i { color: var(--primary); text-shadow: 0 0 20px rgba(124, 58, 237, 0.5); }
    .auth-subtitle { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 2rem; }

    .auth-input-group { position: relative; margin-bottom: 1rem; text-align: left; }
    .auth-input-group i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
    .auth-input {
      width: 100%; background: var(--bg-base); border: 1px solid var(--border);
      color: var(--text-main); padding: 14px 16px 14px 45px; border-radius: 12px;
      font-size: 1rem; outline: none; transition: 0.3s;
    }
    .auth-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2); }

    .btn-auth-main {
      width: 100%; background: var(--primary); color: white; border: none;
      padding: 14px; border-radius: 12px; font-size: 1.05rem; font-weight: 700;
      cursor: pointer; transition: 0.3s; margin-top: 10px;
    }
    .btn-auth-main:hover { background: var(--primary-hover); transform: translateY(-1px); }

    .auth-switch-text { margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem; cursor: pointer; }
    .auth-switch-text span { color: var(--primary); font-weight: 700; }
    .auth-switch-text span:hover { text-decoration: underline; }

    /* --- ANA UYGULAMA LAYOUT --- */
    #app {
      display: none; width: 100%; max-width: 1300px;
      grid-template-columns: var(--sidebar-width) minmax(0, 1fr) var(--right-panel-width);
      min-height: 100vh;
    }

    /* SOL MENÜ (DESKTOP) */
    .sidebar {
      position: sticky; top: 0; height: 100vh; padding: 1.5rem 1rem;
      border-right: 1px solid var(--border); display: flex; flex-direction: column;
      justify-content: space-between;
    }
    .sidebar-top { display: flex; flex-direction: column; gap: 5px; }
    .app-brand { font-size: 1.8rem; font-weight: 800; padding: 0.5rem 1rem 1.5rem 1rem; display: flex; align-items: center; gap: 10px; }
    .app-brand i { color: var(--primary); }

    .nav-link {
      display: flex; align-items: center; gap: 18px; padding: 12px 16px;
      color: var(--text-main); text-decoration: none; font-size: 1.15rem; font-weight: 500;
      border-radius: 99px; transition: 0.2s;
    }
    .nav-link:hover, .nav-link.active { background: var(--bg-surface-hover); color: var(--primary); font-weight: 700; }
    .nav-link i { font-size: 1.4rem; width: 25px; text-align: center; }

    .btn-sidebar-post {
      background: var(--primary); color: white; border: none; padding: 14px;
      border-radius: 99px; font-size: 1.1rem; font-weight: 700; cursor: pointer;
      width: 100%; margin-top: 1rem; transition: 0.3s; box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
    }
    .btn-sidebar-post:hover { background: var(--primary-hover); }

    .user-profile-badge {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; border-radius: 99px; cursor: pointer; transition: 0.2s;
    }
    .user-profile-badge:hover { background: var(--bg-surface-hover); }
    .user-info-wrapper { display: flex; align-items: center; gap: 10px; overflow: hidden; }
    .user-avatar { width: 42px; height: 42px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--accent)); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1rem; flex-shrink: 0; }
    .user-text-box h4 { font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-text-box p { font-size: 0.8rem; color: var(--text-muted); }

    /* ORTA AKIŞ (FEED) */
    .main-feed-container {
      border-right: 1px solid var(--border); min-height: 100vh;
      padding-bottom: 80px; position: relative;
    }
    .feed-header-sticky {
      position: sticky; top: 0; background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(12px); padding: 1rem 1.5rem; z-index: 100;
      border-bottom: 1px solid var(--border); font-size: 1.25rem; font-weight: 800;
      display: flex; justify-content: space-between; align-items: center;
    }

    .composer-box { padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; gap: 15px; }
    .composer-content { flex: 1; }
    .composer-textarea {
      width: 100%; background: transparent; border: none; color: var(--text-main);
      font-size: 1.15rem; resize: none; min-height: 70px; outline: none; margin-top: 8px;
    }
    .composer-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 12px; margin-top: 8px; }
    .composer-icons { display: flex; gap: 15px; color: var(--primary); font-size: 1.2rem; cursor: pointer; }
    .btn-post-submit {
      background: var(--primary); color: white; border: none; padding: 8px 22px;
      border-radius: 99px; font-weight: 700; cursor: pointer; transition: 0.2s;
    }
    .btn-post-submit:hover { background: var(--primary-hover); }

    /* GÖNDERİ KARTLARI */
    .post-card {
      padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--border);
      display: flex; gap: 15px; transition: background 0.2s; cursor: pointer;
    }
    .post-card:hover { background: var(--bg-surface); }
    .post-main-content { flex: 1; overflow: hidden; }
    .post-user-info { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .post-user-info h4 { font-size: 1rem; font-weight: 700; }
    .post-user-info span { font-size: 0.85rem; color: var(--text-muted); }
    .verified-icon { color: #38bdf8; font-size: 0.85rem; }
    .post-body-text { font-size: 1.05rem; line-height: 1.5; word-break: break-word; margin-bottom: 12px; white-space: pre-wrap; }
    .post-actions-row { display: flex; justify-content: space-between; max-width: 400px; color: var(--text-muted); }
    .post-action-btn { display: flex; align-items: center; gap: 6px; font-size: 0.9rem; transition: 0.2s; }
    .post-action-btn:hover { color: var(--primary); }
    .post-action-btn.liked { color: var(--danger); }

    /* SAĞ PANEL (DESKTOP) */
    .right-sidebar { padding: 1.5rem; display: flex; flex-direction: column; gap: 20px; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
    .search-input-wrapper { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 99px; padding: 12px 20px; display: flex; align-items: center; gap: 12px; }
    .search-input-wrapper input { background: transparent; border: none; outline: none; color: white; width: 100%; font-size: 0.95rem; }
    .search-input-wrapper i { color: var(--text-muted); }

    .widget-card { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.2rem; }
    .widget-card h3 { font-size: 1.1rem; font-weight: 800; margin-bottom: 1rem; }
    .trending-topic { margin-bottom: 12px; }
    .trending-topic:last-child { margin-bottom: 0; }
    .trending-topic span { font-size: 0.75rem; color: var(--text-muted); }
    .trending-topic h4 { font-size: 0.95rem; font-weight: 700; margin-top: 2px; }

    /* MOBİL ALT MENÜ */
    .mobile-bottom-nav {
      display: none; position: fixed; bottom: 0; left: 0; width: 100%;
      background: rgba(10, 10, 12, 0.95); backdrop-filter: blur(15px);
      border-top: 1px solid var(--border); z-index: 1000;
      justify-content: space-around; padding: 12px 0;
    }
    .mobile-nav-item { color: var(--text-muted); font-size: 1.4rem; text-decoration: none; transition: 0.2s; }
    .mobile-nav-item.active, .mobile-nav-item:hover { color: var(--primary); }

    /* RESPONSIVE KURALLARI */
    @media (max-width: 1024px) {
      #app { grid-template-columns: 80px 1fr; }
      .sidebar { align-items: center; }
      .app-brand span, .nav-link span, .btn-sidebar-post, .user-text-box { display: none; }
      .right-sidebar { display: none; }
      .sidebar { padding: 1.5rem 0.5rem; }
      .user-profile-badge { justify-content: center; padding: 8px; }
    }

    @media (max-width: 768px) {
      #app { grid-template-columns: 1fr; padding-bottom: 70px; }
      .sidebar { display: none; }
      .mobile-bottom-nav { display: flex; }
      .main-feed-container { border-right: none; }
      .auth-card { padding: 1.5rem; border: none; background: transparent; box-shadow: none; }
      #authOverlay { background: var(--bg-base); }
    }
  </style>
</head>
<body>

  <!-- AUTH EKRANI -->
  <div id="authOverlay">
    <div class="auth-card">
      <div class="auth-logo"><i class="fa-solid fa-bolt-lightning"></i> Aura</div>
      <p class="auth-subtitle" id="authSubtitle">Sınırları aş, kendi aurani yarat.</p>
      
      <div class="auth-input-group" id="usernameGroup" style="display: none;">
        <i class="fa-solid fa-user"></i>
        <input type="text" id="usernameInput" class="auth-input" placeholder="Kullanıcı Adı">
      </div>
      <div class="auth-input-group">
        <i class="fa-solid fa-envelope"></i>
        <input type="email" id="emailInput" class="auth-input" placeholder="E-posta Adresi">
      </div>
      <div class="auth-input-group">
        <i class="fa-solid fa-lock"></i>
        <input type="password" id="passwordInput" class="auth-input" placeholder="Şifre">
      </div>

      <button class="btn-auth-main" id="authBtn" onclick="submitAuth()">Giriş Yap</button>
      
      <p class="auth-switch-text" onclick="toggleAuthMode()" id="authToggleText">
        Hesabın yok mu? <span>Kayıt Ol</span>
      </p>
    </div>
  </div>

  <!-- ANA UYGULAMA -->
  <div id="app">
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="app-brand"><i class="fa-solid fa-bolt-lightning"></i> <span>Aura</span></div>
        <nav style="display: flex; flex-direction: column; gap: 5px;">
          <a href="#" class="nav-link active"><i class="fa-solid fa-house"></i> <span>Ana Sayfa</span></a>
          <a href="#" class="nav-link"><i class="fa-solid fa-compass"></i> <span>Keşfet</span></a>
          <a href="#" class="nav-link"><i class="fa-regular fa-bell"></i> <span>Bildirimler</span></a>
          <a href="#" class="nav-link"><i class="fa-regular fa-envelope"></i> <span>Mesajlar</span></a>
          <a href="#" class="nav-link"><i class="fa-regular fa-user"></i> <span>Profil</span></a>
        </nav>
        <button class="btn-sidebar-post" onclick="document.getElementById('postInput').focus();">Gönder</button>
      </div>

      <div class="user-profile-badge" onclick="logout()" title="Çıkış Yap">
        <div class="user-info-wrapper">
          <div class="user-avatar" id="desktopAvatar">A</div>
          <div class="user-text-box">
            <h4 id="desktopUserName">Kullanıcı</h4>
            <p id="desktopUserHandle">@kullanici</p>
          </div>
        </div>
        <i class="fa-solid fa-right-from-bracket" style="color: var(--danger); font-size: 1rem;"></i>
      </div>
    </aside>

    <main class="main-feed-container">
      <div class="feed-header-sticky">
        <span>Akış</span>
        <i class="fa-solid fa-sparkles" style="color: var(--primary);"></i>
      </div>

      <div class="composer-box">
        <div class="user-avatar" id="composerAvatar" style="width: 44px; height: 44px; font-size: 1.1rem;">A</div>
        <div class="composer-content">
          <textarea id="postInput" class="composer-textarea" placeholder="Aura'da neler oluyor?"></textarea>
          <div class="composer-footer">
            <div class="composer-icons">
              <i class="fa-regular fa-image" title="Medya"></i>
              <i class="fa-solid fa-poll" title="Anket"></i>
              <i class="fa-regular fa-face-smile" title="Emoji"></i>
            </div>
            <button class="btn-post-submit" onclick="addPost()">Paylaş</button>
          </div>
        </div>
      </div>

      <div id="feedContainer"></div>
    </main>

    <aside class="right-sidebar">
      <div class="search-input-wrapper">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Aura'da Ara">
      </div>

      <div class="widget-card">
        <h3>Gündemdekiler</h3>
        <div class="trending-topic">
          <span>Teknoloji · Gündemde</span>
          <h4>#AuraUltraX</h4>
        </div>
        <div class="trending-topic" style="margin-top: 12px;">
          <span>Yazılım · Gündemde</span>
          <h4>#WebDevelopment</h4>
        </div>
      </div>
    </aside>
  </div>

  <div class="mobile-bottom-nav">
    <a href="#" class="mobile-nav-item active"><i class="fa-solid fa-house"></i></a>
    <a href="#" class="mobile-nav-item"><i class="fa-solid fa-compass"></i></a>
    <a href="#" class="mobile-nav-item"><i class="fa-regular fa-bell"></i></a>
    <a href="#" class="mobile-nav-item" onclick="logout()"><i class="fa-regular fa-user"></i></a>
  </div>

  <script>
    let isLoginMode = true;

    window.toggleAuthMode = () => {
      isLoginMode = !isLoginMode;
      document.getElementById('usernameGroup').style.display = isLoginMode ? 'none' : 'block';
      document.getElementById('authSubtitle').innerText = isLoginMode ? 'Sınırları aş, kendi aurani yarat.' : 'Hemen yeni bir hesap oluştur.';
      document.getElementById('authBtn').innerText = isLoginMode ? 'Giriş Yap' : 'Kayıt Ol';
      document.getElementById('authToggleText').innerHTML = isLoginMode ? 'Hesabın yok mu? <span>Kayıt Ol</span>' : 'Zaten hesabın var mı? <span>Giriş Yap</span>';
    };

    window.submitAuth = () => {
      const email = document.getElementById('emailInput').value.trim();
      const password = document.getElementById('passwordInput').value.trim();
      const username = document.getElementById('usernameInput').value.trim();

      if (!email || !password) return alert("Lütfen boş alan bırakmayın!");
      if (!isLoginMode && !username) return alert("Kayıt için kullanıcı adı gerekli!");

      const displayName = isLoginMode ? email.split('@')[0] : username;
      const fakeUser = { displayName: displayName, email: email };
      
      localStorage.setItem('aura_active_user', JSON.stringify(fakeUser));
      initAppUI(fakeUser);
      loadLocalPosts();
    };

    window.logout = () => {
      localStorage.removeItem('aura_active_user');
      location.reload();
    };

    function checkAuth() {
      const localUser = JSON.parse(localStorage.getItem('aura_active_user'));
      if (localUser) {
        initAppUI(localUser);
        loadLocalPosts();
      } else {
        showAuthScreen();
      }
    }

    function initAppUI(user) {
      document.getElementById('authOverlay').style.display = 'none';
      document.getElementById('app').style.display = 'grid';
      
      const name = user.displayName || "Kullanıcı";
      const initial = name.charAt(0).toUpperCase();

      document.getElementById('desktopAvatar').innerText = initial;
      document.getElementById('composerAvatar').innerText = initial;
      document.getElementById('desktopUserName').innerText = name;
      document.getElementById('desktopUserHandle').innerText = "@" + (user.email ? user.email.split('@')[0] : "kullanici");
    }

    function showAuthScreen() {
      document.getElementById('authOverlay').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
    }

    window.addPost = () => {
      const input = document.getElementById('postInput');
      const text = input.value.trim();
      if (!text) return;

      const currentUser = JSON.parse(localStorage.getItem('aura_active_user')) || { displayName: "Kullanıcı", email: "kullanici@aura.com" };
      const authorName = currentUser.displayName;
      const handle = "@" + currentUser.email.split('@')[0];

      let posts = JSON.parse(localStorage.getItem('aura_posts')) || [];
      posts.unshift({ author: authorName, handle: handle, content: text, likes: 0 });
      localStorage.setItem('aura_posts', JSON.stringify(posts));
      input.value = "";
      loadLocalPosts();
    };

    function loadLocalPosts() {
      const feed = document.getElementById('feedContainer');
      const posts = JSON.parse(localStorage.getItem('aura_posts')) || [
        { author: "Aura Resmi", handle: "@aura", content: "Aura Ultra X'e hoş geldiniz! Yeni nesil deneyim şimdi aktif.", likes: 42 }
      ];
      
      feed.innerHTML = "";
      posts.forEach(post => {
        renderPostCard(feed, post);
      });
    }

    function renderPostCard(container, post) {
      const initial = post.author ? post.author.charAt(0).toUpperCase() : 'A';
      const div = document.createElement('div');
      div.className = 'post-card';
      div.innerHTML = `
        <div class="user-avatar" style="width: 42px; height: 42px; font-size: 1rem; flex-shrink: 0;">${initial}</div>
        <div class="post-main-content">
          <div class="post-user-info">
            <h4>${post.author}</h4>
            <i class="fa-solid fa-circle-check verified-icon"></i>
            <span>${post.handle || '@kullanici'}</span>
          </div>
          <div class="post-body-text">${escapeHTML(post.content)}</div>
          <div class="post-actions-row">
            <div class="post-action-btn"><i class="fa-regular fa-comment"></i> 0</div>
            <div class="post-action-btn"><i class="fa-solid fa-retweet"></i> 0</div>
            <div class="post-action-btn" onclick="this.classList.toggle('liked');"><i class="fa-solid fa-heart"></i> ${post.likes || 0}</div>
            <div class="post-action-btn"><i class="fa-solid fa-chart-simple"></i></div>
          </div>
        </div>
      `;
      container.appendChild(div);
    }

    function escapeHTML(str) {
      if (!str) return "";
      return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
    }

    // Uygulama Başlangıcı
    checkAuth();
  </script>
</body>
</html>
